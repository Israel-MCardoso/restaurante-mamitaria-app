pluginManagement {
    includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile().toString())
    includeBuild(new File(["node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim(), "../android/expo-gradle-plugin").absolutePath)
}

plugins {
    id("com.facebook.react.settings")
    id("expo-autolinking-settings")
}

expoAutolinking.projectRoot = file("..")

extensions.configure(com.facebook.react.ReactSettingsExtension) { extension ->
    extension.autolinkLibrariesFromCommand()
}

expoAutolinking.useExpoModules()

rootProject.name = 'Restaurante Admin'

include ':app'
includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json')"].execute(null, rootDir).text.trim()).getParentFile())
